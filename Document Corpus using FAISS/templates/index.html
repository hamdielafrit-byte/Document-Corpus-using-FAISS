<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Semantic Search (Ollama + FAISS)</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { margin-top: 0; color: #1e293b; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #3b82f6; }
        button {
            padding: 12px 24px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2563eb; }
        .results-section, .corpus-section {
            margin-top: 30px;
        }
        .card {
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
        }
        .score {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        .corpus-list {
            font-size: 14px;
            color: #475569;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            list-style-type: square;
            padding-left: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Semantic Search</h1>
    <p>Type a question to search your document store using local AI context understanding.</p>
    
    <div class="search-box">
        <input type="text" id="queryInput" placeholder="Ask something (e.g., 'What language is used for data science?')">
        <button onclick="performSearch()">Search</button>
    </div>

    <div class="results-section">
        <h3>Top Search Results:</h3>
        <div id="resultsContainer">
            <p style="color: #94a3b8; font-style: italic;">No search performed yet.</p>
        </div>
    </div>

    <div class="corpus-section">
        <h3>Available Knowledge Base Documents:</h3>
        <ul class="corpus-list">
            {% for doc in corpus %}
                <li>{{ doc }}</li>
            {% endfor %}
        </ul>
    </div>
</div>

<script>
    // Handle Enter keypress
    document.getElementById('queryInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') performSearch();
    });

    function performSearch() {
        const query = document.getElementById('queryInput').value;
        const container = document.getElementById('resultsContainer');
        
        if (!query.trim()) return;

        container.innerHTML = '<p style="color: #3b82f6;">AI is thinking and searching vectors...</p>';

        // Send backend request using native fetch API
        fetch('/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
        })
        .then(res => res.json())
        .then(data => {
            container.innerHTML = '';
            
            if (data.error) {
                container.innerHTML = `<p style="color: #ef4444;"><b>Error:</b> ${data.error}</p>`;
                return;
            }

            if (data.results.length === 0) {
                container.innerHTML = '<p>No matching documents found.</p>';
                return;
            }

            data.results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>${item.text}</div>
                    <div class="score">Vector Distance Deviation Score: ${item.score.toFixed(4)}</div>
                `;
                container.appendChild(card);
            });
        })
        .catch(err => {
            container.innerHTML = `<p style="color: #ef4444;">Could not contact server backend.</p>`;
        });
    }
</script>

</body>
</html>
